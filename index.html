<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記掛你呀，香港人！</title>
  <style>
    :root {
      --r: min(100vw / 848, 100vh / 1192);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Hannotate TC', sans-serif;
      padding: calc(24 * var(--r));
    }

    /* ===== POSTER WRAPPER ===== */
    .poster {
      position: relative;
      width: calc(1200 * var(--r));
      aspect-ratio: 1 / 1.4142;
      border-radius: calc(18 * var(--r));
      overflow: hidden;
      box-shadow: 0 calc(24 * var(--r)) calc(70 * var(--r)) rgba(0,0,0,0.7);
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background: url('assets/bg_portrait.png') center center / cover no-repeat;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ===== TITLE ===== */
    .title-bar {
      text-align: center;
      padding: calc(15 * var(--r)) calc(30 * var(--r)) 0;
    }

    .title-bar h1 {
      font-family: 'Hannotate TC', sans-serif;
      font-size: calc(72 * var(--r));
      font-weight: 700;
      color: #c4b5fd;
      /* Simulating outline with text-shadow to avoid path overlap artifacts common in variable fonts */
      text-shadow: 
        calc(-1.5 * var(--r)) calc(-1.5 * var(--r)) 0 #382414,  
         calc(1.5 * var(--r)) calc(-1.5 * var(--r)) 0 #382414,
        calc(-1.5 * var(--r))  calc(1.5 * var(--r)) 0 #382414,
         calc(1.5 * var(--r))  calc(1.5 * var(--r)) 0 #382414,
         calc(2 * var(--r)) calc(4 * var(--r)) calc(8 * var(--r)) rgba(0,0,0,0.6);
      letter-spacing: calc(4 * var(--r)); /* Reduced tracking for a tighter appearance */
    }

    /* ===== MIDDLE ===== */
    .middle-row {
      display: flex;
      gap: calc(24 * var(--r));
      margin-top: auto;
      margin-bottom: calc(80 * var(--r)); /* <--- INCREASE THIS to push panels higher */
      padding: calc(40 * var(--r)) calc(40 * var(--r)) 0;
    }

    .panel {
      background: rgba(255, 253, 235, 0.7);
      border-radius: calc(14 * var(--r));
      border: calc(2 * var(--r)) solid rgba(200, 180, 130, 0.3);
      box-shadow: 0 calc(8 * var(--r)) calc(32 * var(--r)) rgba(0,0,0,0.2);
    }

    /* LEFT COLUMN */
    .left-col {
      flex: 1.1;
      display: flex;
      flex-direction: column;
      gap: calc(10 * var(--r));
    }

    .fade-panel {
      background: linear-gradient(90deg, 
        rgba(255, 253, 235, 0) 0%, 
        rgba(255, 253, 235, 0.8) 15%, 
        rgba(255, 253, 235, 0.8) 85%, 
        rgba(255, 253, 235, 0) 100%
      );
    }

    .info-block-panel {
      padding: calc(7 * var(--r)) calc(20 * var(--r));
    }

    .info-block-panel.row-style {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(16 * var(--r));
    }

    .info-block-panel.col-style {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: calc(4 * var(--r));
    }

    .info-label {
      font-size: calc(18 * var(--r));
      font-weight: 700;
      color: #382414;
      text-align: center;
      letter-spacing: calc(1 * var(--r));
    }

    .text-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: calc(2 * var(--r));
    }

    .loc-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(8 * var(--r));
      margin-bottom: calc(2 * var(--r));
    }

    .info-icon { font-size: calc(28 * var(--r)); flex-shrink: 0; }
    .info-icon.large { font-size: calc(44 * var(--r)); }

    .custom-cal {
      width: calc(44 * var(--r));
      height: calc(48 * var(--r));
      background: #fcfcfc;
      border-radius: calc(6 * var(--r));
      border: calc(2 * var(--r)) solid #382414;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: calc(2 * var(--r)) calc(3 * var(--r)) 0 rgba(56,36,20,0.2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .custom-cal .cal-month {
      background: #e24e4e;
      width: 100%;
      color: white;
      font-size: calc(12 * var(--r));
      font-weight: 700;
      text-align: center;
      padding: calc(2 * var(--r)) 0 calc(1 * var(--r));
      border-bottom: calc(2 * var(--r)) solid #382414;
      line-height: 1;
      letter-spacing: calc(1 * var(--r));
    }
    .custom-cal .cal-day {
      font-size: calc(20 * var(--r));
      font-weight: 900;
      color: #382414;
      margin-top: calc(4 * var(--r));
      line-height: 1;
      font-family: Arial, sans-serif;
    }

    .info-text {
      font-family: 'Hannotate TC', sans-serif;
      font-weight: 700;
      color: #1a0f00;
      line-height: 1.3;
    }
    .info-text.xl { font-size: calc(24 * var(--r)); }
    .info-text.lg { font-size: calc(20 * var(--r)); }
    .info-text.md { font-size: calc(15 * var(--r)); }

    hr.div {
      display: none;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      padding: calc(7 * var(--r)) calc(22 * var(--r)) calc(9 * var(--r));
    }

    .purpose-title {
      font-family: 'Hannotate TC', sans-serif;
      font-size: calc(28 * var(--r));
      font-weight: 900;
      color: #1a0f00;
      text-align: center;
      letter-spacing: calc(2 * var(--r));
      margin-bottom: calc(8 * var(--r));
      font-style: italic;
    }

    .purpose-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: calc(10 * var(--r));
      padding-top: calc(5 * var(--r));
    }
    .purpose-list li {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(12 * var(--r));
      font-family: 'Hannotate TC', sans-serif;
      font-size: calc(24 * var(--r));
      font-weight: 700;
      color: #1c1000;
    }

    .p-icon { font-size: calc(20 * var(--r)); width: calc(26 * var(--r)); text-align: center; }



    /* ===== DARK BAND ===== */
    .content-band-wrap {
      padding: 0 calc(24 * var(--r)) calc(10 * var(--r));
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
    }

    .content-band {
      background: #323aa8;
      padding: calc(14 * var(--r)) calc(30 * var(--r));
      text-align: center;
      border-radius: calc(12 * var(--r));
      box-shadow: 0 calc(10 * var(--r)) calc(25 * var(--r)) rgba(0,0,0,0.5);
    }

    .content-band-text {
      font-family: 'Hannotate TC', sans-serif;
      font-size: calc(26 * var(--r));
      font-weight: 700;
      color: #f7eed7;
      letter-spacing: calc(5 * var(--r));
    }

    /* ===== FOOTER ===== */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(24 * var(--r));
      padding: calc(10 * var(--r)) calc(30 * var(--r));
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(calc(5 * var(--r)));
    }

    .org-label {
      font-size: calc(14 * var(--r));
      color: #6b5230;
      font-style: italic;
      letter-spacing: calc(2 * var(--r));
    }

    .vline {
      width: calc(1.5 * var(--r));
      height: calc(38 * var(--r));
      background: rgba(100,80,50,0.3);
    }

    .cm-wrap {
      display: flex;
      align-items: center;
      gap: calc(8 * var(--r));
    }

    .cm-text {
      font-family: 'Hannotate TC', sans-serif;
      font-size: calc(17 * var(--r));
      font-weight: 700;
      color: #1a0f00;
      line-height: 1.2;
    }

    .cm-text .en {
      font-size: calc(11 * var(--r));
      font-weight: 400;
      color: #666;
      display: block;
    }

    /* Broadway Church logo */
    .broadway {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .broadway img {
      height: calc(40 * var(--r)); /* Adjust this height as needed to fit the footer */
      width: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="bg-image"></div>

    <div class="content">
      <!-- Title -->
      <div class="title-bar">
        <h1>記掛你呀，香港人！</h1>
      </div>

      <!-- Two info panels -->
      <div class="middle-row">
        <!-- Left column -->
        <div class="left-col">
          <div class="fade-panel info-block-panel row-style">
            <div class="custom-cal">
              <div class="cal-month">3月</div>
              <div class="cal-day">29</div>
            </div>
            <div class="text-col">
              <div class="info-label">～日期～</div>
              <div class="info-text xl">2026年3月29日</div>
            </div>
          </div>

          <div class="fade-panel info-block-panel row-style">
            <span class="info-icon large">🕐</span>
            <div class="text-col">
              <div class="info-label">～時間～</div>
              <div class="info-text xl">2:30pm</div>
            </div>
          </div>

          <div class="fade-panel info-block-panel col-style">
            <div class="loc-header">
              <span class="info-icon">📍</span>
              <div class="info-label loc-label">～地點～</div>
            </div>
            <div class="info-text lg">Loft 二樓 CityReach Care Society, 2650 Slocan St, Vancouver, BC</div>
          </div>
        </div>

        <!-- Right panel -->
        <div class="fade-panel right-panel">
          <div class="purpose-title">～聚會主旨～</div>
          <ul class="purpose-list">
            <li><span class="p-icon">🇭🇰</span>同香港人</li>
            <li><span class="p-icon">🤝</span>互相認識</li>
            <li><span class="p-icon">🫂</span>分擔重擔</li>
            <li><span class="p-icon">🧑‍🤝‍🧑</span>共同體驗</li>
            <li><span class="p-icon">👥</span>共同等待</li>
            <li><span class="p-icon">🧭</span>同行 + 守望</li>
          </ul>
        </div>
      </div>



      <!-- Dark content band -->
      <div class="content-band-wrap">
        <div class="content-band">
          <span class="content-band-text">內容：破冰，祈禱，分組</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="org-label">～主辦單位～</div>
        <div class="broadway">
          <img src="assets/broadway_logo.png" alt="Broadway Church Logo" />
        </div>
        <div class="cm-wrap">
          <div class="cm-text">
            中文事工
            <span class="en">Chinese Ministry</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
